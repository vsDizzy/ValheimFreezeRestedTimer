name: Build and Deploy Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Pre-calculate Next Version Tag
        id: tag_version
        uses: anothrNick/github-tag-action@1.71.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WITH_V: true
          DEFAULT_BUMP: patch
          PRERELEASE: false

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore Dependencies via NuGet
        run: |
          mkdir TmpPackages
          cd TmpPackages
          cat << 'EOF' > TmpPackages.csproj
          <Project Sdk="Microsoft.NET.Sdk">
            <PropertyGroup>
              <TargetFramework>netstandard2.0</TargetFramework>
              <AssetTargetFallback>net462;net46;net45;net40;net35</AssetTargetFallback>
            </PropertyGroup>
            <ItemGroup>
              <PackageReference Include="Valheim.GameLibs" Version="0.202.14-r.0" />
              <PackageReference Include="BepInEx.Core" Version="5.4.21" />
              <PackageReference Include="HarmonyX" Version="2.13.0" />
            </ItemGroup>
          </Project>
          EOF
          dotnet restore --source https://api.nuget.org/v3/index.json --source https://nuget.bepinex.dev/v3/index.json
          cd ..

      - name: Compile Script to DLL
        run: |
          CSC_PATH=$(find /usr/share/dotnet/sdk -name csc.dll | head -n 1)
          REF_DIR=$(dirname $(find /usr/share/dotnet/packs/Microsoft.NETCore.App.Ref -name System.Runtime.dll | head -n 1))
          NUGET_CACHE="/home/runner/.nuget/packages"

          VALHEIM_DLL=$(find "$NUGET_CACHE" -iname "*valheim*.dll" | head -n 1)
          HARMONY_DLL=$(find "$NUGET_CACHE" -iname "0Harmony.dll" | head -n 1)

          # Explicitly targets the real BepInEx assembly from core instead of baselib
          BEPINEX_DLL=$(find "$NUGET_CACHE/bepinex.core" -name "BepInEx.dll" | head -n 1)

          # References the unstripped UnityEngine assemblies bundled inside Valheim.GameLibs
          VALHEIM_MANAGED_DIR=$(dirname "$VALHEIM_DLL")
          UNITY_CORE_DLL="$VALHEIM_MANAGED_DIR/UnityEngine.CoreModule.dll"
          UNITY_DLL="$VALHEIM_MANAGED_DIR/UnityEngine.dll"

          echo "=== Dependency Paths ==="
          echo "Valheim API: $VALHEIM_DLL"
          echo "Unity Core:  $UNITY_CORE_DLL"
          echo "Unity Full:  $UNITY_DLL"
          echo "Harmony:     $HARMONY_DLL"
          echo "BepInEx:     $BEPINEX_DLL"
          echo "=========================="

          REF_ARGS=()
          for dll in "$REF_DIR"/System*.dll; do
            REF_ARGS+=("/reference:$dll")
          done

          dotnet "$CSC_PATH" /target:library /out:Valheim.FreezeRestedTimer.dll \
            "${REF_ARGS[@]}" \
            /reference:"$REF_DIR/mscorlib.dll" \
            /reference:"$REF_DIR/netstandard.dll" \
            /reference:"$VALHEIM_DLL" \
            /reference:"$UNITY_CORE_DLL" \
            /reference:"$UNITY_DLL" \
            /reference:"$HARMONY_DLL" \
            /reference:"$BEPINEX_DLL" \
            ValheimFreezeRestedTimer.cs

      - name: Push to Orphan Branch
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git checkout --orphan release
          git rm -rf . --cached

          find . -maxdepth 1 -not -name 'Valheim.FreezeRestedTimer.dll' -not -name '.git' -not -name '.' -exec rm -rf {} +

          git add Valheim.FreezeRestedTimer.dll
          git commit -m "Build: Release ${{ steps.tag_version.outputs.new_tag }}"
          git push origin release --force

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag_version.outputs.new_tag }}
          name: Release ${{ steps.tag_version.outputs.new_tag }}
          generate_release_notes: true
          files: Valheim.FreezeRestedTimer.dll
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
