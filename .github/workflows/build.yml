name: Build and Deploy Release

on:
  push:
    branches:
      - main
    paths:
      - '**.cs'
      - '.github/workflows/build.yml'
  workflow_dispatch:

env:
  PROJECT_NAME: Valheim.FreezeRestedTimer

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Pre-calculate Next Version Tag
        id: tag_version
        uses: anothrNick/github-tag-action@1.71.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WITH_V: true
          DEFAULT_BUMP: patch
          PRERELEASE: false

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore Dependencies
        run: |
          mkdir TmpPackages && cd TmpPackages
          cat << 'EOF' > TmpPackages.csproj
          <Project Sdk="Microsoft.NET.Sdk">
            <PropertyGroup><TargetFramework>netstandard2.0</TargetFramework></PropertyGroup>
            <ItemGroup>
              <PackageReference Include="Valheim.GameLibs" Version="0.202.14-r.0" />
              <PackageReference Include="BepInEx.Core" Version="5.4.21" />
              <PackageReference Include="HarmonyX" Version="2.13.0" />
              <PackageReference Include="UnityEngine.Modules" Version="2021.3.33" />
            </ItemGroup>
          </Project>
          EOF
          dotnet restore --source https://api.nuget.org/v3/index.json --source https://nuget.bepinex.dev/v3/index.json

      - name: Compile Script to DLL
        run: |
          CSC_PATH=$(find /usr/share/dotnet/sdk -name csc.dll | head -n 1)
          REF_DIR=$(dirname $(find /usr/share/dotnet/packs/NETStandard.Library.Ref -name netstandard.dll | head -n 1))
          NUGET_CACHE="/home/runner/.nuget/packages"

          VALHEIM_DLL=$(find "$NUGET_CACHE" -iname "*valheim*.dll" | head -n 1)
          HARMONY_DLL=$(find "$NUGET_CACHE" -iname "0Harmony.dll" | head -n 1)
          BEPINEX_DLL=$(find "$NUGET_CACHE" -name "BepInEx.dll" | head -n 1)
          UNITY_CORE_DLL=$(find "$NUGET_CACHE" -name "UnityEngine.CoreModule.dll" | head -n 1)
          UNITY_DLL=$(find "$NUGET_CACHE" -name "UnityEngine.dll" | head -n 1)

          sed -i 's/${VERSION}/${{ steps.tag_version.outputs.new_tag }}/g' ${{ env.PROJECT_NAME }}.cs

          dotnet "$CSC_PATH" /target:library /out:${{ env.PROJECT_NAME }}.dll \
            /reference:"$REF_DIR/netstandard.dll" /reference:"$REF_DIR/mscorlib.dll" \
            /reference:"$VALHEIM_DLL" /reference:"$UNITY_CORE_DLL" /reference:"$UNITY_DLL" \
            /reference:"$HARMONY_DLL" /reference:"$BEPINEX_DLL" \
            *.cs

      - name: Package for Release
        run: |
          mkdir release
          mv ${{ env.PROJECT_NAME }}.dll release/
          zip -j ${{ env.PROJECT_NAME }}.zip release/${{ env.PROJECT_NAME }}.dll

      - name: Create GitHub Release
        run: |
          gh release create ${{ steps.tag_version.outputs.new_tag }} \
            --title "Release ${{ steps.tag_version.outputs.new_tag }}" \
            --generate-notes \
            ${{ env.PROJECT_NAME }}.zip
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
